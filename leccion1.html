<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lección 1 - Programación Visual</title>
    
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        body {
            background-color: #111622; /* Color azul oscuro profundo de fondo */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            margin: 0;
        }

        .leccion-container {
            width: 100%;
            max-width: 900px;
        }

        .main-title {
            font-size: 2.8em;
            color: #ffffff; /* Letras blancas para el título */
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .subtitulo {
            font-size: 1.2em;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        .video-box {
            background-color: #171e2e; /* Tarjeta oscura para el video */
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .video-box h2 {
            color: #38bdf8; /* Azul claro brillante para el título del ejercicio */
            font-size: 1.8em;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 perfecta */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            display: inline-block;
            background-color: #2a2b4e; /* Botón morado de tu menú */
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .back-btn:hover {
            background-color: #3b3d6e;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
    </style>
</head>

            </div>
        </div>

        <!-- Este botón te regresa al menú principal -->
        <a href="index.html" class="back-btn">← Volver al Menú</a>
    </div>
</body>
</html>
